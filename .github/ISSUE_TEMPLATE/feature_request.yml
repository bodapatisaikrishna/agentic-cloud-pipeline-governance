name: Feature request
description: Propose a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check the roadmap items already noted in `README.md` (Tier 2/3 items) and
        `docs/PAPER_MAPPING.md` (future work) — your idea may already be tracked there.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Production (agents / gate / connectors / server / CLI)
        - Research (experiments / analysis / chaos harness)
        - New orchestrator connector (Dagster, Prefect, dbt, …)
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What can't you do today that this would enable?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: If you have one in mind. Not required — a well-described problem is enough.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
