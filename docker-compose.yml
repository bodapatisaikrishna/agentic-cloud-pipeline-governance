# ACDE stack — core (postgres + OPA) plus the Phase 1 data plane (Redpanda + Airflow).
# `make up-core` starts only postgres + opa; `make up` starts everything.
name: acde

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow.Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://${POSTGRES_USER:-acde}:${POSTGRES_PASSWORD:-acde}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth
    # acde config: reach the research DB + broker over the compose network (internal ports)
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_USER: ${POSTGRES_USER:-acde}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acde}
    POSTGRES_DB: ${POSTGRES_DB:-acde}
    BROKER_BOOTSTRAP: redpanda:29092
    DATA_DIR: /opt/airflow/data
    MOCK_LLM: "1"
    AIRFLOW_USER: ${AIRFLOW_USER:-admin}
    AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
  volumes:
    - ./src/acde/dataplane/batch/dags:/opt/airflow/dags:ro
    - ./data:/opt/airflow/data
    - ./docker/airflow-init.sh:/init/airflow-init.sh:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16.6
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acde}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acde}
      POSTGRES_DB: ${POSTGRES_DB:-acde}
    ports:
      # host 5433 -> container 5432, avoiding a local Postgres already on 5432
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acde} -d ${POSTGRES_DB:-acde}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  opa:
    # -debug variant keeps a busybox shell on the distroless base so the
    # wget healthcheck below can run (see DEVIATIONS.md).
    image: openpolicyagent/opa:0.68.0-debug
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "/policies"
    ports:
      - "${OPA_PORT:-8181}:8181"
    volumes:
      - ./infra/opa/policies:/policies:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8181/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --mode=dev-container
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -qE 'Healthy:\\s+true'"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 10s

  airflow-init:
    <<: *airflow-common
    entrypoint: ["bash", "/init/airflow-init.sh"]
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    command: ["scheduler"]
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --local || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    command: ["webserver"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  redpanda_data:
